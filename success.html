<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Order received — Karam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--sand:#F7F1E5;--teal:#1F4D4A;--teal-2:#143735;--saffron:#D4A24C;--pomegranate:#9B2D20;--ink:#231F1B;--ink-2:#4A423B;--olive:#6B7F3A;}
*{box-sizing:border-box}body{margin:0;font-family:'Cairo',system-ui,sans-serif;background:var(--sand);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:24px}
.card{max-width:520px;text-align:center;background:#fff;border-radius:24px;padding:48px 36px;box-shadow:0 24px 60px rgba(35,31,27,.12);border:1px solid rgba(35,31,27,.08)}
.tick{width:88px;height:88px;border-radius:50%;background:var(--olive);color:#fff;display:grid;place-items:center;margin:0 auto 24px;font-size:48px}
h1{font-family:'Amiri',serif;font-size:42px;color:var(--teal);margin:0 0 12px}
h1 .ar{display:block;font-size:22px;color:var(--saffron);margin-bottom:6px}
p{color:var(--ink-2);line-height:1.6;font-size:16px}
.order-num{display:inline-block;font-family:'Amiri',serif;font-size:24px;background:rgba(212,162,76,.15);color:var(--teal);padding:8px 18px;border-radius:12px;margin:14px 0}
.back{display:inline-flex;align-items:center;gap:8px;margin-top:28px;padding:14px 28px;border-radius:999px;background:var(--teal);color:var(--sand);text-decoration:none;font-weight:600;font-size:14px;letter-spacing:.02em}
.back:hover{background:var(--teal-2)}
</style>
</head>
<body>
<div class="card">
  <div class="tick">✓</div>
  <h1><span class="ar">شكراً لك</span>Thank you!</h1>
  <p>Your order is in the kitchen.</p>
  <div class="order-num" id="order-num">—</div>
  <p>We'll contact you on the phone number you provided if there's any issue. Otherwise, expect delivery within the estimated time.</p>
  <a class="back" href="/">← Back to menu</a>
</div>
<script>
  const p = new URLSearchParams(location.search);
  const id = p.get('order');
  if (id) document.getElementById('order-num').textContent = id;
</script>
</body>
</html>
